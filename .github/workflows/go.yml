name: Auto CI
on: [push, pull_request]

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build frontend and generate
        run: |
          cd web
          bun install --frozen-lockfile
          bun run build
          cd ..
          go generate ./...
      - name: Upload generated files
        uses: actions/upload-artifact@v4
        with:
          name: generated
          path: internal/server/out
          retention-days: 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Download generated files
        uses: actions/download-artifact@v4
        with:
          name: generated
          path: internal/server/out
      # Build golangci-lint from source with this module's own Go toolchain so the
      # linter is always compiled with a Go version >= the go.mod target. The
      # prebuilt binaries from golangci-lint-action lag the latest Go release and
      # fail with "the Go language version used to build golangci-lint is lower
      # than the targeted Go version" whenever go.mod moves ahead of them.
      - name: Install golangci-lint
        env:
          GOTOOLCHAIN: local
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Download generated files
        uses: actions/download-artifact@v4
        with:
          name: generated
          path: internal/server/out
      - name: Run unit tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
